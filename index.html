<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pronostics CDM 2026</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background:#f4f6fb;
  margin:0;
}

header{
  background: linear-gradient(90deg,#0a2a66,#6e2cff);
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
}

input{
  width:60px;
  padding:5px;
  margin:5px;
}

button{
  background:#6e2cff;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#4d1fd1;
}

.pari{
  background:#e8f5e9;
  padding:6px;
  border-radius:6px;
  margin-top:5px;
}
</style>
</head>

<body>

<header>⚽ Pronostics Coupe du Monde 2026</header>

<div class="container">

<!-- LOGIN -->
<div id="auth" class="card">
<h3>Connexion</h3>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<button onclick="login()">Connexion</button>
<button onclick="register()">Créer compte</button>

</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
<div id="welcome"></div>
<button onclick="logout()">Déconnexion</button>
</div>

<div class="card">
<h3>Matchs</h3>
<div id="matches"></div>
</div>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
  "https://afgihkxtoeycgomnbjil.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ2loa3h0b2V5Y2dvbW5iamlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNjc4NzgsImV4cCI6MjA5NDg0Mzg3OH0.veCV8TDI6ZVsvt-soSZoJEaKPe2NHoPt9s1NSQ0YVBo"
);

let user = null;
let predictions = {};

// AUTH
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data } = await supabaseClient.auth.signInWithPassword({email,password});
  user = data.user;
  start();
}

async function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await supabaseClient.auth.signUp({email,password});
  alert("Compte créé ✅");
}

function logout(){
  supabaseClient.auth.signOut();
  location.reload();
}

// START
async function start(){
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("welcome").innerText = user.email;

  await loadPredictions();
  loadMatches();
}

// LOAD PREDICTIONS
async function loadPredictions(){
  const { data } = await supabaseClient
    .from("predictions")
    .select("*")
    .eq("user_id", user.id);

  predictions = {};

  data.forEach(p=>{
    predictions[p.match_id] = p;
  });
}

// LOAD MATCHES (TRI PAR BASE ✅)
async function loadMatches(){

  const { data } = await supabaseClient
    .from("matches")
    .select("*")
    .order("start_time", { ascending:true });

  let html = "";

  data.forEach(m=>{

    const now = new Date();
    const start = new Date(m.start_time);

    html += `<div class="card">`;

    html += `<b>${m.team_a} vs ${m.team_b}</b><br>`;
    html += `${start.toLocaleString()}<br>`;

    // ✅ affichage ancien pari
    if(predictions[m.id]){
      html += `
      <div class="pari">
        ✅ Ton pari : ${predictions[m.id].pred_score_a} - ${predictions[m.id].pred_score_b}
      </div>`;
    }

    // ✅ si match pas commencé → saisie possible
    if(now < start){

      html += `
        <input id="a${m.id}" type="number"
        value="${predictions[m.id]?.pred_score_a ?? ''}">
        
        <input id="b${m.id}" type="number"
        value="${predictions[m.id]?.pred_score_b ?? ''}">
        
        <button onclick="savePred(${m.id})">Valider</button>
      `;
    } 
    else {
      html += `<span style="color:red;">🔒 Match fermé</span>`;
    }

    html += `</div>`;
  });

  document.getElementById("matches").innerHTML = html;
}

// SAVE PREDICTION
async function savePred(id){

  const a = document.getElementById("a"+id).value;
  const b = document.getElementById("b"+id).value;

  // récupérer date match
  const { data } = await supabaseClient
    .from("matches")
    .select("start_time")
    .eq("id", id)
    .single();

  const now = new Date();
  const start = new Date(data.start_time);

  if(now >= start){
    alert("❌ Match commencé !");
    return;
  }

  await supabaseClient.from("predictions").upsert(
    {
      user_id: user.id,
      match_id: id,
      pred_score_a: Number(a),
      pred_score_b: Number(b)
    },
    {
      onConflict: ["user_id","match_id"] // ✅ IMPORTANT
    }
  );

  await loadPredictions();
  loadMatches();
}

// AUTO LOGIN
supabaseClient.auth.getUser().then(({data})=>{
  if(data.user){
    user = data.user;
    start();
  }
});

</script>

</body>
</html>
